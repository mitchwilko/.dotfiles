[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane min-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on   = [ "t", "c" ]
run  = "shell 'tmux new-window -c \"$PWD\"' --block"
desc = "Open tmux window at current PWD"

[[mgr.prepend_keymap]]
on   = [ "t", "%" ]
run  = "shell 'tmux split-window -h -c \"$PWD\"' --block"
desc = "Open vertical tmux pane at current PWD"

[[mgr.prepend_keymap]]
on   = [ "t", "\"" ]
run  = "shell 'tmux split-window -v -c \"$PWD\"' --block"
desc = "Open horizontal tmux pane at current PWD"

[[mgr.prepend_keymap]]
on = [ "o", "c" ]
run = 'shell "tmux new-window \"vim \\\"$1\\\"\""'
desc = "Open in new tmux window"

[[mgr.prepend_keymap]]
on = [ "o", "%" ]
run = 'shell "tmux split-window -h \"vim \\\"$1\\\"\""'
desc = "Open in vertical split"

[[mgr.prepend_keymap]]
on = [ "o", "\"" ]
run = 'shell "tmux split-window -v \"vim \\\"$1\\\"\""'
desc = "Open in horizontal split"

[[mgr.prepend_keymap]]
on = [ "o", "o" ]
run = "shell 'vim \"$@\"' --block --confirm"
desc = "Open in VIm"

[[mgr.prepend_keymap]]
on = "%"
run = "plugin split-tabs spl_toggle"
desc = "Split-tabs: toggle split tabs mode"

[[mgr.prepend_keymap]]
on = ">"
run = "plugin split-tabs spl_switch_tab"
desc = "Split-tabs: switch to the other pane"

[[mgr.prepend_keymap]]
on = "<"
run = "plugin split-tabs spl_switch_tab"
desc = "Split-tabs: switch to the other pane"

[[mgr.prepend_keymap]]
on = "P"
run = "plugin split-tabs spl_preview"
desc = "Split-tabs: toggle preview pane"
